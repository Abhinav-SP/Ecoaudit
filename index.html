<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAudit - Waste Logger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <header class="site-header">
        <h1 id="eco-title" style="cursor: pointer; user-select: none;">EcoAudit</h1>
        <p>Community Waste Logger</p>
    </header>

    <section class="scroll-section" id="section1">
        <div class="left-box">
            <form id="waste-form" class="waste-form">
                <h2>Log a Waste Entry</h2>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. eco_hero99" required />
                </div>

                <div class="form-group">
                    <label for="category">Waste Category</label>
                    <select id="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Plastic">Plastic</option>
                        <option value="E-Waste">E-Waste</option>
                        <option value="Organic">Organic</option>
                        <option value="Paper">Paper</option>
                        <option value="Glass">Glass</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (in kg)</label>
                    <input 
                        type="number" 
                        id="weight" 
                        placeholder="e.g. 2.55"
                        step="0.01"
                        min="0.01"
                        required 
                    />
                </div>

                <button type="submit" class="submit-btn">Submit Log</button>
                <div id="error-message" style="display: none; color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 0.9rem; text-align: center; border: 1px solid #ffcdd2;"></div>
            </form>
        </div>

        <div class="right-box">
            <div class="stats-card">
                <h3>Total Waste Logged</h3>
                <p id="total-weight">0.00 <span class="unit">kg</span></p>
            </div>
            <div class="chart-container">
                <canvas id="wasteChart"></canvas>
            </div>
        </div>
    </section>

    <section class="scroll-section" id="section2">
        <div class="left-box">
            <h2>Top 7 Heaviest Logs</h2>
            <ul id="logs-list" class="logs-list">
                <li class="empty-state">Loading logs...</li>
            </ul>
            <button id="download-csv" class="csv-btn">Download CSV Data</button>
        </div>

        <div class="right-box" id="map-container">
            <div id="map"></div>
        </div>
    </section>

    <div id="admin-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" required />
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required />
                </div>
                <div id="admin-error" style="display: none; color: #ff5252; text-align: center; margin-bottom: 15px; font-size: 0.9rem;"></div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" id="cancel-admin-btn" class="csv-btn" style="margin-top: 0; background: rgba(255,255,255,0.05); color: #ccc;">Cancel</button>
                    <button type="submit" id="login-admin-btn" class="submit-btn" style="margin-top: 0;">Login & Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
